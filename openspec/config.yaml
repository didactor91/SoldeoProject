project: SoldeoProject
description: SMAW Welding Simulator — browser-based training tool
context: >
  React-Three-Fiber + Zustand + Vitest. Zero allocations in 60Hz hot path.
  Phase 0 → Phase 7 implementation order per AGENT-RULES-001-SMAW §B.
strict_tdd: false
testing:
  runner: vitest
  layers:
    unit: planned
    integration: planned
    e2e: none
  coverage: planned
  linter: none
  type_checker: tsc
  formatter: none
persistence:
  mode: hybrid
skill_registry_path: .atl/skill-registry.md
changes:
  delivery_strategy: auto-forecast
  review_budget_lines: 400

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
